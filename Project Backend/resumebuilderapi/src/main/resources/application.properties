# Mongodb configuration
spring.data.mongodb.uri=mongodb://localhost:27017/resumebuilder_v2

# Email configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${Your_username}
spring.mail.password=${Your_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${Your_email}

# Application info
app.base.url=http://localhost:8080

# Cloudinary information
cloudinary.cloud-name=${Your_Cloudname}
cloudinary.api-key=${Your_api-key}
cloudinary.api-secret=${Your_api-secret}

# JWT Configuration
jwt.secret=your-secret-key-here-change-this-in-production-with-more-secure-and-complicated-key
jwt.expiration=3888000

# Razorpay Configuration
razorpay.key.id=${Your_razorpay-id}
razorpay.key.secret=${Your_secret-key}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration